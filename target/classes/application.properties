#################################################
# SERVER
#################################################

server.port=${PORT:8083}


#################################################
# DATABASE SUPABASE
#################################################

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.szuajsukpzbnskliizho.supabase.co:5432/postgres}

spring.datasource.username=${DATABASE_USERNAME:postgres}

spring.datasource.password=${DATABASE_PASSWORD:morinopostgresql}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10

spring.datasource.hikari.minimum-idle=2

spring.datasource.hikari.connection-timeout=30000

spring.datasource.hikari.idle-timeout=600000

spring.datasource.hikari.max-lifetime=1800000


#################################################
# JPA
#################################################

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


#################################################
# JWT
#################################################

jwt.secret=${JWT_SECRET:change-me-with-very-long-secret-key}

jwt.expiration=${JWT_EXPIRATION:86400000}


#################################################
# CORS
#################################################

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5176,https://budgetcam.vercel.app}


#################################################
# MAIL
#################################################

spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}

spring.mail.port=${MAIL_PORT:2525}

spring.mail.username=${MAIL_USERNAME:}

spring.mail.password=${MAIL_PASSWORD:}

spring.mail.default-encoding=UTF-8


spring.mail.properties.mail.smtp.auth=true

spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=5000

spring.mail.properties.mail.smtp.timeout=5000

spring.mail.properties.mail.smtp.writetimeout=5000


#################################################
# APP
#################################################

app.mail.from=${MAIL_FROM:noreply@budgetcam.cm}

app.mail.from-name=${MAIL_FROM_NAME:BudgetCam}

app.frontend-url=${FRONTEND_URL:http://localhost:5176}


#################################################
# SCHEDULER
#################################################

spring.task.scheduling.enabled=true


#################################################
# ACTUATOR
#################################################

management.endpoints.web.exposure.include=health,info

management.endpoint.health.show-details=always


#################################################
# LOGS
#################################################

logging.level.com.budgetcam=INFO

logging.level.org.springframework.mail=DEBUG

logging.level.org.hibernate.SQL=DEBUG

logging.level.org.hibernate.type.descriptor.sql=TRACE